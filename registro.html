<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Registro | UniNotas</title>
     <link rel="icon" href="Barra/services_application_3009.ico">

</head>

<body style="font-family: Arial; background-color:#f0f4f8;">

    <header style="background-color:#1a3c6e; color:white; padding:15px; text-align:center;">
        <div style="width:50px; height:50px; background:#fff; border-radius:50%;
                    display:inline-flex; align-items:center; justify-content:center;
                    vertical-align:middle; margin-right:10px;">
            <span style="color:#1a3c6e; font-weight:bold; font-size:1.1rem;">UN</span>
        </div>
        <span style="font-size:1.8rem; font-weight:bold; vertical-align:middle;">UniNotas</span>
        <p style="margin:5px 0 0 0; font-size:0.95rem;">Sistema de Gestión de Notas Universitarias</p>
    </header>

    <main>
        <section style="width:500px; margin:30px auto; background-color:white;
                        padding:30px; border:1px solid #ccc; border-radius:10px;">

            <h2 style="text-align:center; color:green; font-size:1.6rem;">Crear Cuenta</h2>
            <p style="text-align:center; font-size:0.95rem; color:#555;">
                Completa todos los campos para registrarte en el sistema
            </p>
            <hr>

            <form action="principal.html" method="post">

                <div style="margin-bottom:15px;">
                    <label for="nombres" style="font-weight:bold;">Nombres</label>
                    <br><br>
                    <input type="text" id="nombres" name="nombres"
                           placeholder="Ej: Juan Carlos" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="margin-bottom:15px;">
                    <label for="apellidos" style="font-weight:bold;">Apellidos</label>
                    <br><br>
                    <input type="text" id="apellidos" name="apellidos"
                           placeholder="Ej: Pérez Torres" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="margin-bottom:15px;">
                    <label for="cedula" style="font-weight:bold;">Cédula de Identidad</label>
                    <br><br>
                    <input type="text" id="cedula" name="cedula"
                           placeholder="Ej: 1712345678" maxlength="10" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="margin-bottom:15px;">
                    <label for="fecha_nacimiento" style="font-weight:bold;">Fecha de Nacimiento</label>
                    <br><br>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="margin-bottom:15px;">
                    <label for="genero" style="font-weight:bold;">Género</label>
                    <br><br>
                    <select id="genero" name="genero" required
                            style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                        <option value="">-- Selecciona una opción --</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Prefiero no decir</option>
                    </select>
                </div>

                <div style="margin-bottom:15px;">
                    <label for="semestre" style="font-weight:bold;">Semestre</label>
                    <br><br>
                    <select id="semestre" name="semestre" required
                            style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                        <option value="">-- Selecciona tu semestre --</option>
                        <option value="1">1er Semestre</option>
                        <option value="2">2do Semestre</option>
                        <option value="3">3er Semestre</option>
                        <option value="4">4to Semestre</option>
                        <option value="5">5to Semestre</option>
                        <option value="6">6to Semestre</option>
                        <option value="7">7mo Semestre</option>
                        <option value="8">8vo Semestre</option>
                    </select>
                </div>

                <div style="margin-bottom:15px;">
                    <label for="correo_registro" style="font-weight:bold;">Correo Institucional</label>
                    <br><br>
                    <input type="email" id="correo_registro" name="correo_registro"
                           placeholder="correo@universidad.edu.ec" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="margin-bottom:20px;">
                    <label for="contrasena_registro" style="font-weight:bold;">Contraseña</label>
                    <br><br>
                    <input type="password" id="contrasena_registro" name="contrasena_registro"
                           placeholder="Entre 8 y 16 caracteres"
                           minlength="8" maxlength="16" required
                           style="width:95%; padding:10px; border:1px solid #ccc; border-radius:5px;" />
                </div>

                <div style="text-align:center;">
                    <button type="submit"
                            style="background-color:green; color:white; padding:10px 20px;
                                   border:none; border-radius:5px; cursor:pointer;
                                   width:100%; font-size:1rem;">
                        Registrarme
                    </button>
                </div>

            </form>

            <p style="text-align:center; margin-top:20px; font-size:0.95rem;">
                ¿Ya tienes cuenta? <a href="index.html" style="color:green;">Inicia sesión aquí</a>
            </p>

        </section>
    </main>

    <footer style="text-align:center; background-color:#1a3c6e; color:white; padding:15px; margin-top:30px;">
        <p>&copy; 2025 Anndy Tomalo &mdash; Sistema de Gestión de Notas Universitarias</p>
    </footer>

</body>
</html>
